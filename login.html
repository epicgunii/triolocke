<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrioLocke — Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #151828;
      --border:    #2a2f4a;
      --accent:    #e63946;
      --accent2:   #f4a261;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Pokeball decorativa de fondo */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 60px solid rgba(230, 57, 70, 0.06);
      pointer-events: none;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: rgba(230, 57, 70, 0.12);
      border: 1px solid rgba(230, 57, 70, 0.3);
      border-radius: var(--radius);
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }

    .info {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="logo">TRIOLOCKE</div>
  <p class="subtitle">Pokémon Añil · 3 jugadores · 30 vidas</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>

    <div id="error-msg" class="error"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Entrar a la partida</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Tu nombre de entrenador</label>
        <input type="text" id="reg-name" placeholder="Ash, Misty, Brock..." />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
      </div>
      <button class="btn" onclick="register()">Crear cuenta</button>
      <p class="info">Solo pueden unirse 3 entrenadores.<br>La partida se bloqueará al completarse.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDbe70TRHespj7KW60VpOroh6_-Kqp9oXg",
      authDomain: "triolocke-2d788.firebaseapp.com",
      projectId: "triolocke-2d788",
      storageBucket: "triolocke-2d788.firebasestorage.app",
      messagingSenderId: "923261403031",
      appId: "1:923261403031:web:08b102bc6f34ef642bced2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.switchTab = (tab) => {
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideError();
    };

    window.login = async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (!email || !pass) return showError('Rellena todos los campos.');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'lobby.html';
      } catch (e) {
        showError('Email o contraseña incorrectos.');
      }
    };

    window.register = async () => {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-pass').value;
      if (!name || !email || !pass) return showError('Rellena todos los campos.');
      if (pass.length < 6) return showError('La contraseña debe tener al menos 6 caracteres.');

      // Comprobar que no haya ya 3 jugadores
      try {
        const snapshot = await getDocs(collection(db, 'jugadores'));
        if (snapshot.size >= 3) return showError('La partida ya está completa. Solo pueden unirse 3 entrenadores.');

        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });

        // Crear perfil del jugador en Firestore
        await setDoc(doc(db, 'jugadores', cred.user.uid), {
          nombre: name,
          email: email,
          vidas: 30,
          puntos: 0,
          eliminado: false,
          equipo: [],
          cementerio: [],
          creadoEn: new Date().toISOString()
        });

        window.location.href = 'lobby.html';
      } catch (e) {
        console.log("ERROR REGISTRO:", e.code, e.message);
        if (e.code === 'auth/email-already-in-use') showError('Ese email ya está registrado.');
        else showError('Error al crear la cuenta. Inténtalo de nuevo.');
      }
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    // Si ya está logueado, ir directamente al lobby
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'lobby.html';
    });
  </script>
</body>
</html>
