<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrioLocke — Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #151828;
      --border:    #2a2f4a;
      --accent:    #e63946;
      --accent2:   #f4a261;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 60px solid rgba(230, 57, 70, 0.06);
      pointer-events: none;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-google {
      width: 100%;
      background: #fff;
      border: none;
      border-radius: var(--radius);
      color: #1f1f1f;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.2s;
    }

    .btn-google:hover { opacity: 0.92; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .error {
      background: rgba(230, 57, 70, 0.12);
      border: 1px solid rgba(230, 57, 70, 0.3);
      border-radius: var(--radius);
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
      text-align: left;
    }

    .info {
      color: var(--muted);
      font-size: 11px;
      margin-top: 20px;
      line-height: 1.6;
    }
    @media (max-width: 600px) {
      .logo { font-size: 16px; }
      .card { padding: 28px 20px; }
      .btn-google { font-size: 14px; padding: 13px; }
    }
  </style>
</head>
<body>

  <div class="logo">TRIOLOCKE</div>
  <p class="subtitle">Pokémon Añil · 3 jugadores · 30 vidas</p>

  <div class="card">
    <div class="card-title">Bienvenido, entrenador</div>
    <div class="card-sub">Inicia sesión con tu cuenta de Google para unirte a la partida.</div>

    <div id="error-msg" class="error"></div>

    <button class="btn-google" onclick="loginGoogle()" id="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="info">Solo pueden unirse 3 entrenadores.<br>La partida se bloqueará al completarse.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDbe70TRHespj7KW60VpOroh6_-Kqp9oXg",
      authDomain: "triolocke-2d788.firebaseapp.com",
      projectId: "triolocke-2d788",
      storageBucket: "triolocke-2d788.firebasestorage.app",
      messagingSenderId: "923261403031",
      appId: "1:923261403031:web:08b102bc6f34ef642bced2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'lobby.html';
    });

    window.loginGoogle = async () => {
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.textContent = 'Conectando...';
      hideError();

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Comprobar si ya tiene perfil
        const perfilRef = doc(db, 'jugadores', user.uid);
        const perfilSnap = await getDoc(perfilRef);

        if (!perfilSnap.exists()) {
          // Comprobar límite de 3 jugadores
          const snapshot = await getDocs(collection(db, 'jugadores'));
          if (snapshot.size >= 3) {
            showError('La partida ya está completa. Solo pueden unirse 3 entrenadores.');
            btn.disabled = false;
            btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continuar con Google`;
            return;
          }

          // Crear perfil nuevo
          await setDoc(perfilRef, {
            nombre: user.displayName || 'Entrenador',
            email: user.email,
            foto: user.photoURL || '',
            vidas: 30,
            puntos: 0,
            eliminado: false,
            equipo: [],
            cementerio: [],
            creadoEn: new Date().toISOString()
          });
        }

        window.location.href = 'lobby.html';

      } catch (e) {
        console.log('ERROR LOGIN:', e.code, e.message);
        if (e.code === 'auth/popup-closed-by-user') {
          showError('Cerraste la ventana de Google. Inténtalo de nuevo.');
        } else {
          showError('Error al conectar con Google. Inténtalo de nuevo.');
        }
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continuar con Google`;
      }
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }
  </script>
</body>
</html>
