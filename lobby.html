<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrioLocke — Lobby</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f1a;
      --surface:  #151828;
      --surface2: #1c2035;
      --border:   #2a2f4a;
      --accent:   #e63946;
      --accent2:  #f4a261;
      --green:    #2ecc71;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      font-size: 13px;
      color: var(--muted);
    }

    .user-badge span {
      color: var(--text);
      font-weight: 600;
    }

    .btn-small {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.88; }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* RONDA INFO */
    .round-banner {
      background: linear-gradient(135deg, #1a1030, #0d1a2a);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 18px 24px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .round-label {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .round-title {
      font-size: 16px;
      font-weight: 700;
    }

    .round-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .badges-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      title: attr(data-name);
    }

    .badge-icon.earned {
      border-color: var(--accent2);
      background: rgba(244, 162, 97, 0.15);
    }

    /* JUGADORES GRID */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 14px;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .player-card:hover { border-color: #3a4060; }

    .player-card.is-me { border-color: var(--accent); }

    .player-header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .player-name {
      font-weight: 700;
      font-size: 15px;
    }

    .player-tag {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .player-stats {
      display: flex;
      gap: 16px;
      text-align: right;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .stat-value.lives { color: var(--green); }
    .stat-value.lives.warning { color: var(--accent2); }
    .stat-value.lives.danger { color: var(--accent); }
    .stat-value.points { color: var(--accent2); }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* EQUIPO POKEMON */
    .team-slots {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pokemon-slot {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
    }

    .pokemon-slot.empty {
      opacity: 0.35;
      justify-content: center;
    }

    .poke-sprite {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .poke-info { overflow: hidden; }

    .poke-name {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .poke-level {
      font-size: 10px;
      color: var(--muted);
    }

    .poke-dead {
      opacity: 0.4;
      filter: grayscale(1);
    }

    .player-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .eliminated-overlay {
      padding: 20px;
      text-align: center;
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
    }

    /* MARCADOR PVP */
    .pvp-section {
      margin-bottom: 32px;
    }

    .pvp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .pvp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .pvp-matchup {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .pvp-player {
      font-weight: 700;
      font-size: 14px;
      flex: 1;
    }

    .pvp-player.right { text-align: right; }

    .pvp-score {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      padding: 0 16px;
      color: var(--accent2);
    }

    .pvp-rounds {
      display: flex;
      gap: 6px;
    }

    .pvp-round-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    .pvp-round-dot.win-a { background: var(--accent); }
    .pvp-round-dot.win-b { background: var(--accent2); }

    /* FEED */
    .feed-section { margin-bottom: 32px; }

    .feed-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .feed-item {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
    }

    .feed-item:last-child { border-bottom: none; }

    .feed-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .feed-text { flex: 1; line-height: 1.5; }

    .feed-text strong { color: var(--accent2); }

    .feed-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      margin-top: 2px;
    }

    .feed-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* CEMENTERIO */
    .cemetery-section { margin-bottom: 32px; }

    .cemetery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dead-poke {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      filter: grayscale(0.7);
      opacity: 0.7;
    }

    .dead-poke img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }

    .dead-poke-info { font-size: 11px; }
    .dead-poke-name { font-weight: 600; }
    .dead-poke-owner { color: var(--muted); }

    .cemetery-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px 0;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 13px;
      color: var(--muted);
    }
    /* MOBILE */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .logo { font-size: 11px; }
      .user-badge { display: none; }
      .header-right { gap: 8px; }
      .btn-small { padding: 6px 10px; font-size: 11px; }
      main { padding: 16px 12px; }
      .round-banner { flex-direction: column; align-items: flex-start; padding: 14px 16px; }
      .badges-row { flex-wrap: wrap; }
      .players-grid { grid-template-columns: 1fr; }
      .team-slots { grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px 12px; }
      .pokemon-slot { padding: 5px; gap: 4px; min-height: 44px; }
      .poke-name { font-size: 9px; }
      .poke-level { font-size: 9px; }
      .poke-sprite { width: 26px; height: 26px; }
      .pvp-grid { grid-template-columns: 1fr; }
      .pvp-score { font-size: 13px; padding: 0 10px; }
      .player-footer { flex-direction: column; gap: 6px; align-items: stretch; }
      .player-footer button { width: 100%; }
      .stat-value { font-size: 15px; }
      .feed-item { font-size: 12px; }
      .section-title { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div id="app-loading" class="loading">Cargando partida...</div>

  <div id="app" style="display:none">
    <header>
      <div class="logo">TRIOLOCKE</div>
      <div class="header-right">
        <div class="user-badge">Jugando como <span id="header-name">—</span></div>
        <button class="btn-small" onclick="irAPerfil()">Mi perfil</button>
        <button class="btn-small" onclick="cerrarSesion()">Salir</button>
      </div>
    </header>

    <main>
      <!-- RONDA ACTUAL -->
      <div class="round-banner">
        <div>
          <div class="round-label">Estado de la partida</div>
          <div class="round-title" id="round-title">Inicio del TrioLocke</div>
          <div class="round-sub" id="round-sub">Completad los 2 primeros gimnasios para el primer combate PvP</div>
        </div>
        <div>
          <div class="round-label" style="margin-bottom:8px">Medallas</div>
          <div class="badges-row" id="badges-row">
            <!-- generadas por JS -->
          </div>
        </div>
      </div>

      <!-- JUGADORES -->
      <div class="section-title">Entrenadores</div>
      <div class="players-grid" id="players-grid">
        <!-- generado por JS -->
      </div>

      <!-- MARCADOR PVP -->
      <div class="pvp-section">
        <div class="section-title">Marcador PvP</div>
        <div class="pvp-grid" id="pvp-grid">
          <!-- generado por JS -->
        </div>
      </div>

      <!-- FEED -->
      <div class="feed-section">
        <div class="section-title">Últimos eventos</div>
        <div class="feed-list" id="feed-list">
          <div class="feed-empty">Aún no hay eventos. ¡Empezad a jugar!</div>
        </div>
      </div>

      <!-- CEMENTERIO -->
      <div class="cemetery-section">
        <div class="section-title">⚰️ Cementerio</div>
        <div class="cemetery-grid" id="cemetery-grid">
          <div class="cemetery-empty">Ninguna baja todavía. Que dure.</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDbe70TRHespj7KW60VpOroh6_-Kqp9oXg",
      authDomain: "triolocke-2d788.firebaseapp.com",
      projectId: "triolocke-2d788",
      storageBucket: "triolocke-2d788.firebasestorage.app",
      messagingSenderId: "923261403031",
      appId: "1:923261403031:web:08b102bc6f34ef642bced2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const MEDALLAS = ['🔴','🟠','⚡','🌊','🌿','❄️','🔥','💜'];
    const MEDALLA_NOMBRES = ['Roca','Cascade','Trueno','Arcoiris','Alma','Pantano','Volcán','Tierra'];

    let currentUser = null;
    let jugadoresCache = {};

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      document.getElementById('header-name').textContent = user.displayName || 'Entrenador';
      document.getElementById('app-loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      iniciarEscuchas();
    });

    function iniciarEscuchas() {
      // Escuchar jugadores en tiempo real
      onSnapshot(collection(db, 'jugadores'), (snap) => {
        jugadoresCache = {};
        snap.forEach(d => { jugadoresCache[d.id] = { id: d.id, ...d.data() }; });
        renderJugadores();
        renderPvP();
        renderCementerio();
      });

      // Escuchar partida en tiempo real
      onSnapshot(doc(db, 'partida', 'estado'), (snap) => {
        if (snap.exists()) renderEstado(snap.data());
      });

      // Escuchar feed en tiempo real
      onSnapshot(collection(db, 'feed'), (snap) => {
        const eventos = [];
        snap.forEach(d => eventos.push({ id: d.id, ...d.data() }));
        eventos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        renderFeed(eventos.slice(0, 15));
      });
    }

    function renderJugadores() {
      const grid = document.getElementById('players-grid');
      const jugadores = Object.values(jugadoresCache);
      if (!jugadores.length) { grid.innerHTML = '<p style="color:var(--muted);font-size:13px">Esperando jugadores...</p>'; return; }

      grid.innerHTML = jugadores.map(j => {
        const esYo = j.id === currentUser.uid;
        const vidasClass = j.vidas > 15 ? 'lives' : j.vidas > 8 ? 'lives warning' : 'lives danger';
        const equipo = j.equipo || [];

        if (j.eliminado) {
          return `<div class="player-card">
            <div class="player-header">
              <div class="player-info">
                <div class="player-avatar">${j.nombre[0].toUpperCase()}</div>
                <div>
                  <div class="player-name">${j.nombre}</div>
                  <div class="player-tag">Eliminado</div>
                </div>
              </div>
            </div>
            <div class="eliminated-overlay">☠️ Sin vidas — Eliminado del TrioLocke</div>
          </div>`;
        }

        const slots = Array(6).fill(null).map((_, i) => {
          const p = equipo[i];
          if (!p) return `<div class="pokemon-slot empty"><span style="font-size:18px">—</span></div>`;
          const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id || 0}.png`;
          return `<div class="pokemon-slot ${p.muerto ? 'poke-dead' : ''}">
            <img class="poke-sprite" src="${sprite}" alt="${p.nombre}" onerror="this.style.display='none'" />
            <div class="poke-info">
              <div class="poke-name">${p.apodo || p.nombre || '???'}</div>
              <div class="poke-level">Nv. ${p.nivel || '?'}</div>
            </div>
          </div>`;
        }).join('');

        return `<div class="player-card ${esYo ? 'is-me' : ''}">
          <div class="player-header">
            <div class="player-info">
              <div class="player-avatar">${j.nombre[0].toUpperCase()}</div>
              <div>
                <div class="player-name">${j.nombre} ${esYo ? '<span style="font-size:10px;color:var(--accent)">TÚ</span>' : ''}</div>
                <div class="player-tag">${j.puntos || 0} puntos</div>
              </div>
            </div>
            <div class="player-stats">
              <div class="stat">
                <div class="stat-value ${vidasClass}">${j.vidas}</div>
                <div class="stat-label">Vidas</div>
              </div>
              <div class="stat">
                <div class="stat-value points">${j.puntos || 0}</div>
                <div class="stat-label">Pts</div>
              </div>
            </div>
          </div>
          <div class="team-slots">${slots}</div>
          <div class="player-footer">
            <span style="font-size:11px;color:var(--muted)">${equipo.filter(p=>p&&!p.muerto).length}/6 activos</span>
            ${esYo ? `<button class="btn-primary" onclick="irAPerfil()">Editar equipo</button>` : `<button class="btn-small" onclick="verPerfil('${j.id}')">Ver detalle</button>`}
          </div>
        </div>`;
      }).join('');
    }

    function renderPvP() {
      const jugadores = Object.values(jugadoresCache);
      if (jugadores.length < 2) {
        document.getElementById('pvp-grid').innerHTML = '<p style="color:var(--muted);font-size:13px">Esperando jugadores para el marcador...</p>';
        return;
      }
      const combates = [];
      for (let i = 0; i < jugadores.length; i++)
        for (let j = i + 1; j < jugadores.length; j++)
          combates.push([jugadores[i], jugadores[j]]);

      document.getElementById('pvp-grid').innerHTML = combates.map(([a, b]) => {
        const ptsa = (a.pvp || {})[b.id] || 0;
        const ptsb = (b.pvp || {})[a.id] || 0;
        return `<div class="pvp-card">
          <div class="pvp-matchup">
            <div class="pvp-player">${a.nombre}</div>
            <div class="pvp-score">${ptsa} — ${ptsb}</div>
            <div class="pvp-player right">${b.nombre}</div>
          </div>
        </div>`;
      }).join('');
    }

    function renderEstado(estado) {
      const medallas = estado.medallas || 0;
      document.getElementById('round-title').textContent = estado.titulo || 'TrioLocke en curso';
      document.getElementById('round-sub').textContent = estado.descripcion || '';
      const row = document.getElementById('badges-row');
      row.innerHTML = MEDALLAS.map((emoji, i) =>
        `<div class="badge-icon ${i < medallas ? 'earned' : ''}" title="${MEDALLA_NOMBRES[i]}">${emoji}</div>`
      ).join('');
    }

    function renderFeed(eventos) {
      const list = document.getElementById('feed-list');
      if (!eventos.length) { list.innerHTML = '<div class="feed-empty">Aún no hay eventos. ¡Empezad a jugar!</div>'; return; }
      list.innerHTML = eventos.map(e => {
        const fecha = e.fecha ? new Date(e.fecha).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
        return `<div class="feed-item">
          <div class="feed-icon">${e.icono || '📌'}</div>
          <div class="feed-text">${e.texto}</div>
          <div class="feed-time">${fecha}</div>
        </div>`;
      }).join('');
    }

    function renderCementerio() {
      const jugadores = Object.values(jugadoresCache);
      const muertos = [];
      jugadores.forEach(j => {
        (j.cementerio || []).forEach(p => muertos.push({ ...p, duenio: j.nombre }));
      });
      const grid = document.getElementById('cemetery-grid');
      if (!muertos.length) { grid.innerHTML = '<div class="cemetery-empty">Ninguna baja todavía. Que dure.</div>'; return; }
      grid.innerHTML = muertos.map(p => {
        const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id || 0}.png`;
        return `<div class="dead-poke">
          <img src="${sprite}" onerror="this.style.display='none'" />
          <div class="dead-poke-info">
            <div class="dead-poke-name">${p.apodo || p.nombre || '???'}</div>
            <div class="dead-poke-owner">de ${p.duenio}</div>
          </div>
        </div>`;
      }).join('');
    }

    window.irAPerfil = () => window.location.href = 'perfil.html';
    window.verPerfil = (uid) => window.location.href = `perfil.html?uid=${uid}`;
    window.cerrarSesion = async () => { await signOut(auth); window.location.href = 'login.html'; };

    // Medallas por defecto si no hay doc de partida aún
    document.getElementById('badges-row').innerHTML = MEDALLAS.map((emoji, i) =>
      `<div class="badge-icon" title="${MEDALLA_NOMBRES[i]}">${emoji}</div>`
    ).join('');
  </script>
</body>
</html>
