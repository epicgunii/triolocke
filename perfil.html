<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrioLocke — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f1a;
      --surface:  #151828;
      --surface2: #1c2035;
      --border:   #2a2f4a;
      --accent:   #e63946;
      --accent2:  #f4a261;
      --green:    #2ecc71;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-small {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-small:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-danger {
      background: none;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: var(--accent); color: #fff; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }

    .profile-avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; }
    .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .profile-email { font-size: 13px; color: var(--muted); }

    .profile-stats {
      display: flex;
      gap: 24px;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-value.lives { color: var(--green); }
    .stat-value.lives.warning { color: var(--accent2); }
    .stat-value.lives.danger { color: var(--accent); }
    .stat-value.points { color: var(--accent2); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 14px;
    }

    /* EQUIPO */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }

    .pokemon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .pokemon-card:hover { border-color: #3a4060; }
    .pokemon-card.dead { opacity: 0.5; border-color: var(--accent); }

    .pokemon-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .poke-sprite-big {
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .poke-main-info { flex: 1; }
    .poke-apodo { font-size: 15px; font-weight: 700; }
    .poke-nombre { font-size: 12px; color: var(--muted); }
    .poke-nivel { font-size: 12px; color: var(--accent2); margin-top: 2px; }

    .dead-badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .pokemon-card-body { padding: 12px 14px; }

    .poke-detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .poke-detail-label { color: var(--muted); }
    .poke-detail-value { font-weight: 600; }

    .movimientos-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    .movimiento-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      padding: 3px 8px;
    }

    .pokemon-card-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* SLOT VACÍO */
    .slot-vacio {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      font-size: 13px;
    }

    .slot-vacio:hover { border-color: var(--accent); color: var(--accent); }
    .slot-vacio .plus { font-size: 28px; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
      display: none;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title { font-size: 15px; font-weight: 700; }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .modal-body { padding: 24px; }

    .modal-preview {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      min-height: 80px;
    }

    .modal-sprite {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
    }

    .modal-poke-name { font-size: 16px; font-weight: 700; }
    .modal-poke-types { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    select option { background: var(--surface); }

    .movimientos-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      max-height: 180px;
      overflow-y: auto;
      z-index: 999;
      display: none;
    }

    .autocomplete-item {
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-transform: capitalize;
      transition: background 0.15s;
    }

    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--surface2); color: var(--accent2); }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* CEMENTERIO */
    .cemetery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .dead-poke {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      filter: grayscale(0.7);
      opacity: 0.7;
    }

    .dead-poke img {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
    }

    .dead-poke-name { font-size: 12px; font-weight: 600; }
    .dead-poke-info { font-size: 11px; color: var(--muted); }

    .cemetery-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 16px 0;
    }

    .readonly-banner {
      background: rgba(244, 162, 97, 0.1);
      border: 1px solid rgba(244, 162, 97, 0.3);
      border-radius: var(--radius);
      color: var(--accent2);
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 13px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: var(--radius);
      z-index: 300;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="app-loading" class="loading">Cargando perfil...</div>
  <div id="toast" class="toast">✓ Guardado</div>

  <div id="app" style="display:none">
    <header>
      <div class="logo">TRIOLOCKE</div>
      <div style="display:flex;gap:10px">
        <button class="btn-small" onclick="window.location.href='lobby.html'">← Lobby</button>
      </div>
    </header>

    <main>
      <div id="readonly-banner" class="readonly-banner" style="display:none">
        👁️ Estás viendo el perfil de otro entrenador — solo lectura
      </div>

      <!-- CABECERA PERFIL -->
      <div class="profile-header" id="profile-header">
        <!-- generado por JS -->
      </div>

      <!-- EQUIPO -->
      <div class="section-title">Equipo activo</div>
      <div class="team-grid" id="team-grid">
        <!-- generado por JS -->
      </div>

      <!-- CEMENTERIO -->
      <div class="section-title">⚰️ Cementerio personal</div>
      <div class="cemetery-grid" id="cemetery-grid">
        <div class="cemetery-empty">Ninguna baja todavía.</div>
      </div>
    </main>
  </div>

  <!-- MODAL AÑADIR/EDITAR POKEMON -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Añadir Pokémon</div>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-preview" id="modal-preview">
          <div style="color:var(--muted);font-size:13px;width:100%;text-align:center">Introduce el número de Pokédex para ver el sprite</div>
        </div>

        <div class="form-group">
          <label>Número de Pokédex</label>
          <input type="number" id="input-pokedex" min="1" max="1025" placeholder="Ej: 25 (Pikachu)" oninput="cargarSprite()" />
        </div>

        <div class="form-group">
          <label>Apodo</label>
          <input type="text" id="input-apodo" placeholder="El nombre que le pusiste" />
        </div>

        <div class="form-group">
          <label>Nivel</label>
          <input type="number" id="input-nivel" min="1" max="100" placeholder="1-100" />
        </div>

        <div class="form-group">
          <label>Naturaleza</label>
          <select id="input-naturaleza">
            <option value="">— Sin especificar —</option>
            <option>Audaz</option><option>Osada</option><option>Pícara</option>
            <option>Activa</option><option>Ingenua</option><option>Mansa</option>
            <option>Plácida</option><option>Seria</option><option>Gozosa</option>
            <option>Jovial</option><option>Tímida</option><option>Apresurada</option>
            <option>Alegre</option><option>Ingenua</option><option>Seria</option>
            <option>Modesta</option><option>Agitada</option><option>Rara</option>
            <option>Dócil</option><option>Floja</option><option>Firme</option>
            <option>Gélida</option><option>Cauta</option><option>Miedosa</option>
            <option>Amable</option>
          </select>
        </div>

        <div class="form-group">
          <label>Objeto equipado</label>
          <div class="autocomplete-wrap">
            <input type="text" id="input-objeto" placeholder="Ej: Baya Zidra, Restos..." oninput="window.autocomplete(this, 'item')" autocomplete="off" />
            <div class="autocomplete-list" id="ac-input-objeto"></div>
          </div>
        </div>

        <div class="form-group">
          <label>Ruta de captura</label>
          <input type="text" id="input-ruta" placeholder="Ej: Ruta 1, Torre Añil..." />
        </div>

        <div class="form-group">
          <label>Movimientos (hasta 4)</label>
          <div class="movimientos-inputs">
            <div class="autocomplete-wrap">
              <input type="text" id="mov1" placeholder="Movimiento 1" oninput="window.autocomplete(this, 'move')" autocomplete="off" />
              <div class="autocomplete-list" id="ac-mov1"></div>
            </div>
            <div class="autocomplete-wrap">
              <input type="text" id="mov2" placeholder="Movimiento 2" oninput="window.autocomplete(this, 'move')" autocomplete="off" />
              <div class="autocomplete-list" id="ac-mov2"></div>
            </div>
            <div class="autocomplete-wrap">
              <input type="text" id="mov3" placeholder="Movimiento 3" oninput="window.autocomplete(this, 'move')" autocomplete="off" />
              <div class="autocomplete-list" id="ac-mov3"></div>
            </div>
            <div class="autocomplete-wrap">
              <input type="text" id="mov4" placeholder="Movimiento 4" oninput="window.autocomplete(this, 'move')" autocomplete="off" />
              <div class="autocomplete-list" id="ac-mov4"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-small" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarPokemon()">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDbe70TRHespj7KW60VpOroh6_-Kqp9oXg",
      authDomain: "triolocke-2d788.firebaseapp.com",
      projectId: "triolocke-2d788",
      storageBucket: "triolocke-2d788.firebasestorage.app",
      messagingSenderId: "923261403031",
      appId: "1:923261403031:web:08b102bc6f34ef642bced2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let perfilUID = null;
    let esPropio = false;
    let perfilData = null;
    let editandoIndex = -1;

    const NATURALES = [];

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;

      const params = new URLSearchParams(window.location.search);
      perfilUID = params.get('uid') || user.uid;
      esPropio = perfilUID === user.uid;

      if (!esPropio) {
        document.getElementById('readonly-banner').style.display = 'block';
      }

      document.getElementById('app-loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      onSnapshot(doc(db, 'jugadores', perfilUID), (snap) => {
        if (!snap.exists()) return;
        perfilData = snap.data();
        renderPerfil();
        renderEquipo();
        renderCementerio();
      });
    });

    function renderPerfil() {
      const d = perfilData;
      const vidasClass = d.vidas > 15 ? 'lives' : d.vidas > 8 ? 'lives warning' : 'lives danger';
      document.getElementById('profile-header').innerHTML = `
        ${d.foto
          ? `<img class="profile-avatar" src="${d.foto}" alt="${d.nombre}" />`
          : `<div class="profile-avatar-placeholder">${d.nombre[0].toUpperCase()}</div>`
        }
        <div class="profile-info">
          <div class="profile-name">${d.nombre}</div>
          <div class="profile-email">${d.email}</div>
        </div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value ${vidasClass}">${d.vidas}</div>
            <div class="stat-label">Vidas</div>
          </div>
          <div class="stat">
            <div class="stat-value points">${d.puntos || 0}</div>
            <div class="stat-label">Puntos</div>
          </div>
          <div class="stat">
            <div class="stat-value">${(d.cementerio || []).length}</div>
            <div class="stat-label">Caídos</div>
          </div>
        </div>
      `;
    }

    function renderEquipo() {
      const equipo = perfilData.equipo || [];
      const grid = document.getElementById('team-grid');
      let html = equipo.map((p, i) => pokemonCard(p, i)).join('');

      if (esPropio && equipo.length < 6) {
        html += `<div class="slot-vacio" onclick="abrirModal(-1)">
          <span class="plus">+</span>
          <span>Añadir Pokémon</span>
        </div>`;
      }

      if (!html) html = `<div style="color:var(--muted);font-size:13px">El equipo está vacío.</div>`;
      grid.innerHTML = html;
    }

    function pokemonCard(p, i) {
      const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.pokedex || 0}.png`;
      const movs = [p.mov1, p.mov2, p.mov3, p.mov4].filter(Boolean);
      const botonesEdicion = esPropio ? `
        <button class="btn-small" onclick="abrirModal(${i})">Editar</button>
        ${!p.muerto ? `<button class="btn-danger" onclick="marcarMuerto(${i})">☠️ Muerto</button>` : ''}
      ` : '';

      return `<div class="pokemon-card ${p.muerto ? 'dead' : ''}">
        <div class="pokemon-card-header">
          <img class="poke-sprite-big" src="${sprite}" onerror="this.style.display='none'" />
          <div class="poke-main-info">
            <div class="poke-apodo">${p.apodo || '???'}</div>
            <div class="poke-nombre">#${p.pokedex || '?'} ${p.nombre || ''}</div>
            <div class="poke-nivel">Nv. ${p.nivel || '?'}</div>
          </div>
          ${p.muerto ? '<span class="dead-badge">☠️ CAÍDO</span>' : ''}
        </div>
        <div class="pokemon-card-body">
          ${p.naturaleza ? `<div class="poke-detail-row"><span class="poke-detail-label">Naturaleza</span><span class="poke-detail-value">${p.naturaleza}</span></div>` : ''}
          ${p.objeto ? `<div class="poke-detail-row"><span class="poke-detail-label">Objeto</span><span class="poke-detail-value">${p.objeto}</span></div>` : ''}
          ${p.ruta ? `<div class="poke-detail-row"><span class="poke-detail-label">Capturado en</span><span class="poke-detail-value">${p.ruta}</span></div>` : ''}
          ${movs.length ? `<div class="movimientos-list">${movs.map(m => `<span class="movimiento-tag">${m}</span>`).join('')}</div>` : ''}
        </div>
        ${esPropio ? `<div class="pokemon-card-footer">${botonesEdicion}</div>` : ''}
      </div>`;
    }

    function renderCementerio() {
      const cementerio = perfilData.cementerio || [];
      const grid = document.getElementById('cemetery-grid');
      if (!cementerio.length) {
        grid.innerHTML = '<div class="cemetery-empty">Ninguna baja todavía.</div>';
        return;
      }
      grid.innerHTML = cementerio.map(p => {
        const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.pokedex || 0}.png`;
        return `<div class="dead-poke">
          <img src="${sprite}" onerror="this.style.display='none'" />
          <div>
            <div class="dead-poke-name">${p.apodo || p.nombre || '???'}</div>
            <div class="dead-poke-info">#${p.pokedex || '?'} · Nv.${p.nivel || '?'} · ${p.ruta || 'Ruta desconocida'}</div>
          </div>
        </div>`;
      }).join('');
    }

    // MODAL
    window.abrirModal = (index) => {
      if (!esPropio) return;
      editandoIndex = index;
      precargarAC();
      document.getElementById('modal-title').textContent = index === -1 ? 'Añadir Pokémon' : 'Editar Pokémon';

      if (index >= 0) {
        const p = perfilData.equipo[index];
        document.getElementById('input-pokedex').value = p.pokedex || '';
        document.getElementById('input-apodo').value = p.apodo || '';
        document.getElementById('input-nivel').value = p.nivel || '';
        document.getElementById('input-naturaleza').value = p.naturaleza || '';
        document.getElementById('input-objeto').value = p.objeto || '';
        document.getElementById('input-ruta').value = p.ruta || '';
        document.getElementById('mov1').value = p.mov1 || '';
        document.getElementById('mov2').value = p.mov2 || '';
        document.getElementById('mov3').value = p.mov3 || '';
        document.getElementById('mov4').value = p.mov4 || '';
        if (p.pokedex) cargarSprite();
      } else {
        ['input-pokedex','input-apodo','input-nivel','input-objeto','input-ruta','mov1','mov2','mov3','mov4'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('input-naturaleza').value = '';
        document.getElementById('modal-preview').innerHTML = '<div style="color:var(--muted);font-size:13px;width:100%;text-align:center">Introduce el número de Pokédex para ver el sprite</div>';
      }

      document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.cerrarModal = () => {
      document.getElementById('modal-overlay').style.display = 'none';
    };

    window.cargarSprite = async () => {
      const num = document.getElementById('input-pokedex').value;
      if (!num || num < 1) return;
      const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${num}.png`;
      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${num}`);
        const data = await res.json();
        const nombre = data.name.charAt(0).toUpperCase() + data.name.slice(1);
        const tipos = data.types.map(t => t.type.name).join(' / ');
        document.getElementById('modal-preview').innerHTML = `
          <img class="modal-sprite" src="${sprite}" />
          <div>
            <div class="modal-poke-name">${nombre}</div>
            <div class="modal-poke-types">${tipos}</div>
          </div>
        `;
        if (!document.getElementById('input-apodo').value) {
          document.getElementById('input-apodo').value = nombre;
        }
        window._pokemonNombre = nombre;
      } catch {
        document.getElementById('modal-preview').innerHTML = `<img class="modal-sprite" src="${sprite}" /><div style="color:var(--muted);font-size:13px">Pokémon #${num}</div>`;
        window._pokemonNombre = '';
      }
    };

    window.guardarPokemon = async () => {
      const pokedex = parseInt(document.getElementById('input-pokedex').value);
      const apodo = document.getElementById('input-apodo').value.trim();
      const nivel = parseInt(document.getElementById('input-nivel').value) || 0;
      if (!pokedex || !apodo) { alert('Introduce al menos el número de Pokédex y el apodo.'); return; }

      const pokemon = {
        pokedex,
        nombre: window._pokemonNombre || '',
        apodo,
        nivel,
        naturaleza: document.getElementById('input-naturaleza').value,
        objeto: document.getElementById('input-objeto').value.trim(),
        ruta: document.getElementById('input-ruta').value.trim(),
        mov1: document.getElementById('mov1').value.trim(),
        mov2: document.getElementById('mov2').value.trim(),
        mov3: document.getElementById('mov3').value.trim(),
        mov4: document.getElementById('mov4').value.trim(),
        muerto: false
      };

      const equipo = [...(perfilData.equipo || [])];
      if (editandoIndex >= 0) {
        pokemon.muerto = equipo[editandoIndex].muerto || false;
        equipo[editandoIndex] = pokemon;
      } else {
        equipo.push(pokemon);
      }

      await updateDoc(doc(db, 'jugadores', currentUser.uid), { equipo });

      // Añadir al feed si es nuevo
      if (editandoIndex === -1) {
        await addDoc(collection(db, 'feed'), {
          icono: '🎉',
          texto: `<strong>${perfilData.nombre}</strong> añadió a <strong>${apodo}</strong> (#${pokedex}) a su equipo`,
          fecha: new Date().toISOString()
        });
      }

      cerrarModal();
      mostrarToast();
    };

    window.marcarMuerto = async (index) => {
      if (!confirm('¿Marcar este Pokémon como caído? Se moverá al cementerio y perderás 1 vida.')) return;
      const equipo = [...(perfilData.equipo || [])];
      const cementerio = [...(perfilData.cementerio || [])];
      const vidas = perfilData.vidas;
      const p = { ...equipo[index], muerto: true };
      cementerio.push(p);
      equipo.splice(index, 1);
      const nuevasVidas = Math.max(0, vidas - 1);
      const eliminado = nuevasVidas === 0;

      await updateDoc(doc(db, 'jugadores', currentUser.uid), {
        equipo,
        cementerio,
        vidas: nuevasVidas,
        eliminado
      });

      await addDoc(collection(db, 'feed'), {
        icono: '💀',
        texto: `<strong>${perfilData.nombre}</strong> perdió a <strong>${p.apodo || p.nombre}</strong>. Le quedan ${nuevasVidas} vidas.${eliminado ? ' ¡Ha sido eliminado del TrioLocke!' : ''}`,
        fecha: new Date().toISOString()
      });

      mostrarToast('☠️ Pokémon caído');
    };

    function mostrarToast(msg = '✓ Guardado') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    // AUTOCOMPLETE
    const acCache = { move: null, item: null };

    async function cargarLista(tipo) {
      if (acCache[tipo]) return acCache[tipo];
      const url = tipo === 'move'
        ? 'https://pokeapi.co/api/v2/move?limit=950'
        : 'https://pokeapi.co/api/v2/item?limit=2000';
      const res = await fetch(url);
      const data = await res.json();
      acCache[tipo] = data.results.map(r => r.name);
      return acCache[tipo];
    }

    // Precargar en segundo plano al abrir el modal
    window.precargarAC = () => {
      cargarLista('move');
      cargarLista('item');
    };

    window.autocomplete = async (input, tipo) => {
      const query = input.value.toLowerCase().trim();
      const listId = 'ac-' + input.id;
      const list = document.getElementById(listId);

      if (query.length < 2) { list.style.display = 'none'; return; }

      const todos = await cargarLista(tipo);
      const filtrados = todos
        .filter(n => n.includes(query))
        .slice(0, 8);

      if (!filtrados.length) { list.style.display = 'none'; return; }

      list.innerHTML = filtrados.map(n =>
        `<div class="autocomplete-item" onmousedown="seleccionarAC('${input.id}', '${n}')">${n.replace(/-/g, ' ')}</div>`
      ).join('');
      list.style.display = 'block';
    };

    window.seleccionarAC = (inputId, valor) => {
      const input = document.getElementById(inputId);
      input.value = valor.replace(/-/g, ' ');
      document.getElementById('ac-' + inputId).style.display = 'none';
    };

    // Cerrar autocomplete al clicar fuera
    document.addEventListener('click', (e) => {
      document.querySelectorAll('.autocomplete-list').forEach(l => {
        if (!l.previousElementSibling?.contains(e.target)) l.style.display = 'none';
      });
    });

    // Cerrar modal al clicar fuera
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) cerrarModal();
    });
  </script>
</body>
</html>
